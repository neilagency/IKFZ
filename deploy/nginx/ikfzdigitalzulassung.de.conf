# =================================================================
# NGINX Configuration for ikfzdigitalzulassung.de
# =================================================================
# Next.js reverse proxy with SSL, security headers, and caching.
#
# Installation:
#   1. Copy this file to /etc/nginx/sites-available/ikfzdigitalzulassung.de
#   2. Create symlink: ln -s /etc/nginx/sites-available/ikfzdigitalzulassung.de /etc/nginx/sites-enabled/
#   3. Test config: nginx -t
#   4. Reload: systemctl reload nginx
#
# SSL Setup (Let's Encrypt):
#   certbot --nginx -d ikfzdigitalzulassung.de -d www.ikfzdigitalzulassung.de
# =================================================================

# ── Redirect www → non-www (HTTPS) ─────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name www.ikfzdigitalzulassung.de ikfzdigitalzulassung.de;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP → HTTPS
    location / {
        return 301 https://ikfzdigitalzulassung.de$request_uri;
    }
}

# ── www → non-www redirect (HTTPS) ─────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.ikfzdigitalzulassung.de;

    ssl_certificate /etc/letsencrypt/live/ikfzdigitalzulassung.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ikfzdigitalzulassung.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://ikfzdigitalzulassung.de$request_uri;
}

# ── Main server block ──────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ikfzdigitalzulassung.de;

    ssl_certificate /etc/letsencrypt/live/ikfzdigitalzulassung.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ikfzdigitalzulassung.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security Headers ───────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Limits ─────────────────────────────────────
    client_max_body_size 20M;

    # ── Gzip Compression ──────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml
               application/xml+rss text/javascript image/svg+xml;

    # ── Static files from Next.js (served by NGINX for performance) ──
    location /_next/static/ {
        alias /var/www/ikfzdigitalzulassung.de/.next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Public files (favicon, images, uploaded documents) ──
    location /uploads/ {
        alias /var/www/ikfzdigitalzulassung.de/public/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /favicon.ico {
        alias /var/www/ikfzdigitalzulassung.de/public/favicon.ico;
        expires 30d;
        access_log off;
    }

    location /robots.txt {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /sitemap.xml {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Next.js reverse proxy ─────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Allow .well-known ──
    location /.well-known/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Block hidden files (except .well-known above) ──
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Block access to sensitive paths ───────────
    location ~ ^/(\.env|\.git|node_modules) {
        deny all;
        return 404;
    }
}
